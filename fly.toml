# fly.toml app configuration file generated for invoicer-app-mellowing-fire-1915 on 2026-06-25T10:28:32+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'invoicer-app-mellowing-fire-1915'
primary_region = 'ams'

[build]

[deploy]
  release_command = "uv run --no-sync python scripts/ingest_legal_corpus.py"

[env]
  INTAKE_INTERVAL_MINUTES = '1'
  INVOICER_DATA_DIR = '/data'
  PORT = '8080'
  PUBLIC_BASE_URL = 'https://invoicer-app-mellowing-fire-1915.fly.dev'

[[mounts]]
  source = 'invoicer_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
