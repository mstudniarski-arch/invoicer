stages:
  - test

test:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  script:
    - uv sync --frozen
    - uv run ruff check .
    - uv run ruff format --check .
    - uv run pytest -q

audit:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  allow_failure: true
  script:
    - uv sync --frozen
    - uv run pip-audit
